<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Важный вопрос</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;

    background:
    radial-gradient(circle at 15% 20%, rgba(255,140,100,.45) 0%, transparent 25%),
    radial-gradient(circle at 85% 25%, rgba(255,120,180,.40) 0%, transparent 25%),
    radial-gradient(circle at 70% 80%, rgba(255,180,120,.35) 0%, transparent 25%),
    linear-gradient(
        135deg,
        #fff0e8 0%,
        #ffe6f0 35%,
        #ffd9c7 70%,
        #fff2ea 100%
    );
}

.card{
    width:90%;
    max-width:520px;
    padding:42px 34px;
    text-align:center;

    background:rgba(255,255,255,0.88);

    backdrop-filter:blur(25px);

    border-radius:32px;

    border:1px solid rgba(255,255,255,.9);

    box-shadow:
    0 25px 70px rgba(255,120,180,.15),
    0 10px 30px rgba(255,140,100,.12);
}

h1{
    color:#1f2937;
    font-size:34px;
    font-weight:700;
    margin-bottom:12px;
}

.subtitle{
    color:#6b7280;
    margin-bottom:28px;
    font-size:15px;
}

.buttons{
    display:flex;
    justify-content:center;
    gap:16px;
}

button{
    border:none;
    cursor:pointer;

    padding:14px 34px;

    border-radius:14px;

    font-size:18px;

    transition:.25s;
}

button:hover{
    transform:translateY(-2px);
}

#yesBtn{
    background:linear-gradient(135deg,#ff8a65,#ff6fa5);
    color:white;

    box-shadow:0 10px 25px rgba(255,111,165,.35);
}

#noBtn{
    background:white;
    color:#374151;

    border:1px solid #e5e7eb;
}

#page2{
    display:none;
}

input{
    width:100%;

    margin-top:14px;

    padding:14px;

    border-radius:12px;

    border:1px solid #d1d5db;

    font-size:16px;
}

.confirm{
    width:100%;

    margin-top:20px;

    background:linear-gradient(135deg,#ff8a65,#ff6fa5);

    color:white;
}

.success h1{
    margin-bottom:16px;
}

.success p{
    font-size:20px;
    color:#6b7280;
}

</style>
</head>
<body>

<div class="card" id="page1">

    <h1>Пойдешь ли ты гулять?</h1>

    <p class="subtitle">
        Нужно выбрать только один вариант
    </p>

    <div class="buttons">
        <button id="yesBtn">Да</button>
        <button id="noBtn">Нет</button>
    </div>

</div>

<div class="card" id="page2">

    <h1>Отлично, тогда выбирай время</h1>

    <input type="date" id="date">

    <input type="time" id="time">

    <button class="confirm" onclick="finish()">
        Подтвердить
    </button>

</div>

<script>

const noBtn = document.getElementById("noBtn");

function moveButton(){

    const currentX = noBtn.offsetLeft;
    const currentY = noBtn.offsetTop;

    const moveRange = 115;

    let x = currentX + (Math.random() * moveRange * 2 - moveRange);
    let y = currentY + (Math.random() * moveRange * 2 - moveRange);

    x = Math.max(
        10,
        Math.min(window.innerWidth - noBtn.offsetWidth - 10, x)
    );

    y = Math.max(
        10,
        Math.min(window.innerHeight - noBtn.offsetHeight - 10, y)
    );

    noBtn.style.position = "fixed";
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
}

noBtn.addEventListener("mouseenter", moveButton);

noBtn.addEventListener("touchstart", function(e){
    e.preventDefault();
    moveButton();
});

document.getElementById("yesBtn").onclick = function(){

    document.getElementById("page1").style.display = "none";

    document.getElementById("page2").style.display = "block";
};

function finish(){
    const date = document.getElementById("date").value;
    const time = document.getElementById("time").value;
    if(!date || !time){
        alert("Выберите дату и время");
        return;
    }
    const BOT_TOKEN = "8935578972:AAG9LX_RORU8UJG24MTMbeXjzX6ymS7i18Q";
    const CHAT_ID = "1124645494";
    fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            chat_id: CHAT_ID,
            text:
`Новая заявка на прогулку
Дата: ${date}
Время: ${time}`
        })
    }).catch(console.error);
    document.body.innerHTML = `
        <div class="card success">
            <h1>Отлично!</h1>
            <p>Встречаемся ${date} в ${time}</p>
        </div>
    `;
}

</script>

</body>
</html>
